<div class="layout-wrapper">

  @if (isSidebarOpen()) {
    <div class="overlay" (click)="closeSidebar()"></div>
  }

  <aside class="sidebar" [class.sidebar-open]="isSidebarOpen()">
    <div class="sidebar-header">
      <a routerLink="/dashboard/home" class="logo-text">TaskManager</a>
    </div>

    <nav class="sidebar-nav">
      @for (link of navLinks; track link.path) {
        <a [routerLink]="link.path" routerLinkActive="active-link" class="nav-item" (click)="closeSidebar()" >
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="link.icon" />
          </svg>
          <span>{{ link.label }}</span>
        </a>
      }
    </nav>
  </aside>

  <div class="main-content">

    <header class="navbar">
      <button class="hamburger-btn" (click)="toggleSidebar()" aria-label="Toggle menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

      <div class="navbar-spacer"></div>

      <div class="user-menu">
        <span class="user-name">{{ authService.currentUser()?.fullName }}</span>
        <button class="logout-btn" (click)="logout()" aria-label="Logout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </button>
      </div>
    </header>

    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
