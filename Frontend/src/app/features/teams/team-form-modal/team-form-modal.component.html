<div class="modal-overlay" (click)="onCancel()">
    <div class="modal-box" (click)="$event.stopPropagation()">
        <h2>{{ isEditMode ? 'Edit Team' : 'New Team'}}</h2>

        <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="name">Team Name</label>
                <input id="name" type="text" formControlName="TName" placeholder="e.g. Backend Squad" />
                @if(form.get('TName')?.touched && form?.get('Tmame')?.hasError('required')){
                    <span class="field-error">Name is required.</span>
                }
            </div>

            <div class="form-group">
                <label for="description">Description (optuional)</label>
                <textarea id="description" type="text" formControlName="description" rows="3" placeholder="What dose this team do?"></textarea>
            </div>

            @if (errorMessage()){
                <p class="form-error"> {{errorMessage() }}</p>
            }

            <div class="modal-actions">
                <button type="button" class="btn-ghost" (click)="onCancel()">Cancel</button>
                <button type="submit" class="btn-primary" [disabled]="isSubmitting()">
                    {{ isSubmitting() ? 'Saving...' : (isEditMode ? 'Save Changes' : 'Create Team')}}
                </button>
            </div>
        </form>
    </div>
</div>
