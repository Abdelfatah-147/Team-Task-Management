<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
        <div class="flex items-center justify-center p-6 border-b border-gray-100">
            <h2 class="text-xl font-bold text-gray-800">{{ isEditMode() ? 'Edit Task' : 'Create Task'}}</h2>
            <button type="button" (click)="onClose()" class="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors">
               ✕ 
            </button>
        </div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="p-6 space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">
                    Title <span class="text-red-500">*</span>
                </label>
                <input formControlName="title" type="text" placeholder="Task title" 
                class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 transition-all text-sm"
                [class.border-red-400]="form.get('title')?.invalid && form.get('title')?.touched" />
                
                @if(form.get('title')?.invalid && form.get('title')?.touched){
                    <p class="text-red-500 text-xs mt-1">Title is required (min 2 characters).</p>
                }
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Description</label>
                <textarea formControlName="description" rows="3" placeholder="Optional description"
                class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 transition-all text-sm resize-none">
                </textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">
                Priority <span class="text-red-500">*</span>
                </label>
                <select formControlName="priority" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 transition-all text-sm bg-white">
                    @for (opt of priorityOptions; track opt.value) {
                        <option [value]="opt.value">{{ opt.label }}</option>
                    }
                </select>
            </div>

            @if (isEditMode()) {
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">
                        Status <span class="text-red-500">*</span>
                    </label>
                    <select formControlName="status" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 transition-all text-sm bg-white">
                        @for (opt of statusOptions; track opt.value) {
                            <option [value]="opt.value">{{ opt.label }}</option>
                        }
                    </select>
                </div>
            }

            @if (members().length > 0) {
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Assign To</label>
                    <select formControlName="assignedToUserId" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 transition-all text-sm bg-white">
                        <option value="">— Unassigned —</option>
                        @for (member of members(); track member.id) {
                            <option [value]="member.id">{{ member.fullName }} ({{ member.email }})</option>
                        }
                    </select>
                </div>
            }

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Due Date</label>
                <input formControlName="dueDate" type="date" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 transition-all text-sm" />
            </div>

            @if (errorMessage()) {
                <div class="bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-xl">
                    {{ errorMessage() }}
                </div>
            }

            <div class="flex gap-3 pt-2">
                <button type="button" (click)="onClose()" class="flex-1 px-4 py-2.5 rounded-xl border border-gray-200 text-gray-600 text-sm font-medium hover:bg-gray-50 transition-colors">
                    Cancel
                </button>
                <button type="submit" [disabled]="isSubmitting()" class="flex-1 px-4 py-2.5 rounded-xl bg-blue-600 text-white text-sm font-medium hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                    {{ isSubmitting() ? 'Saving...' : (isEditMode() ? 'Update Task' : 'Create Task') }}
                </button>
            </div>
        </form>
    </div>

    

</div>
